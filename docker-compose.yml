version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: worklog-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pass_2026}
      POSTGRES_DB: ${POSTGRES_DB:-construction_work_log}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-construction_work_log}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - worklog-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worklog-backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${BACKEND_PORT:-3001}
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - worklog-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3001/api}
    container_name: worklog-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    depends_on:
      - backend
    networks:
      - worklog-network

volumes:
  postgres_data:

networks:
  worklog-network:
    driver: bridge
